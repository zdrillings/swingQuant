features:
  trend:
    - name: "sma_50_dist"
      type: "pct_diff"
      params: { window: 50 }
    - name: "sma_200_dist"
      type: "pct_diff"
      params: { window: 200 }
    - name: "ma_alignment_50_200"
      type: "moving_average_gap"
      params: { short_window: 50, long_window: 200 }
    - name: "ma_slope_50_20"
      type: "moving_average_slope"
      params: { window: 50, slope_window: 20 }
    - name: "ma_slope_200_20"
      type: "moving_average_slope"
      params: { window: 200, slope_window: 20 }
    - name: "atr_14"
      type: "atr"
      params: { window: 14 }
    - name: "atr_pct_14"
      type: "atr_pct"
      params: { window: 14 }
  momentum:
    - name: "rsi_14"
      type: "rsi"
      params: { window: 14 }
    - name: "rsi_2"
      type: "rsi"
      params: { window: 2 }
    - name: "roc_63"
      type: "roc"
      params: { window: 63 }
    - name: "relative_strength_index_vs_spy"
      ticker: "SPY"
      type: "relative_strength_percentile"
      params: { window: 63 }
  volume:
    - name: "vol_alpha"
      type: "ratio_to_avg"
      params: { window: 20 }
    - name: "breakout_volume_ratio_50"
      type: "ratio_to_avg"
      params: { window: 50 }
    - name: "base_volume_dryup_ratio_20"
      type: "volume_dryup_ratio"
      params: { recent_window: 10, prior_window: 10 }
  price_structure:
    - name: "base_range_pct_20"
      type: "base_range_pct"
      params: { window: 20 }
    - name: "base_atr_contraction_20"
      type: "base_atr_contraction"
      params: { atr_window: 14, recent_window: 10, prior_window: 10 }
    - name: "breakout_above_20d_high"
      type: "breakout_above_high"
      params: { window: 20 }
    - name: "distance_above_20d_high"
      type: "distance_above_high"
      params: { window: 20 }
  gap_risk:
    - name: "avg_abs_gap_pct_20"
      type: "avg_abs_gap_pct"
      params: { window: 20 }
    - name: "max_gap_down_pct_60"
      type: "max_gap_down_pct"
      params: { window: 60 }
  commodities:
    - name: "oil_corr_60"
      ticker: "USO"
      type: "correlation"
      params: { window: 60 }
  event_risk:
    - name: "days_to_next_earnings"
      type: "days_to_next_event"
    - name: "days_since_last_earnings"
      type: "days_since_last_event"

signal_model:
  default_pass_score: 30
  hard_filter_indicators:
    - "relative_strength_index_vs_spy_min"
    - "sma_50_dist_min"
    - "ma_alignment_50_200_min"
    - "ma_slope_50_20_min"
    - "ma_slope_200_20_min"
    - "breakout_above_20d_high_min"
    - "distance_above_20d_high_max"
    - "days_to_next_earnings_min"
    - "days_since_last_earnings_min"
  score_spans:
    rsi_14_min: 20
    rsi_14_max: 30
    vol_alpha_min: 1.2
    breakout_volume_ratio_50_min: 1.5
    sma_200_dist_min: 0.25
    sma_200_dist_max: 0.20
    roc_63_min: 0.20
    base_range_pct_20_max: 0.10
    base_atr_contraction_20_max: 0.40
    base_volume_dryup_ratio_20_max: 0.40
    avg_abs_gap_pct_20_max: 0.03
    max_gap_down_pct_60_max: 0.06
    oil_corr_60_min: 0.60
  score_weights:
    rsi_14_min: 0.6
    rsi_14_max: 1.0
    vol_alpha_min: 0.4
    breakout_volume_ratio_50_min: 1.2
    sma_200_dist_min: 1.0
    sma_200_dist_max: 0.8
    roc_63_min: 1.0
    base_range_pct_20_max: 1.0
    base_atr_contraction_20_max: 0.8
    base_volume_dryup_ratio_20_max: 0.8
    avg_abs_gap_pct_20_max: 0.7
    max_gap_down_pct_60_max: 0.8
    oil_corr_60_min: 0.6

backtest_costs:
  slippage_bps_per_side: 5
  commission_bps_per_side: 0

scan_policy:
  max_candidates_total: 6
  max_candidates_per_slot: 3
  max_candidates_per_sector: 3
  pre_cap_candidates_per_slot: 5
  min_opportunity_score: 0.55
  ranking_weights:
    signal_score: 0.35
    expected_alpha: 0.30
    freshness: 0.20
    breadth: 0.15
  overlap_penalties:
    same_ticker: 1.00
    same_slot: 0.08
    same_sector: 0.00
    same_regime: 0.00
  learned_ranker:
    weight: 1.00
    min_train_rows: 40
    min_train_dates: 8
    slot_weights:
      energy: 2.00
      materials: 0.25

promotion_policy:
  min_profit_factor: 1.30
  min_expectancy: 0.004
  min_trade_count: 100
  max_mdd: 0.30
  walk_forward:
    windows: 5
    min_window_count: 5
    min_positive_window_ratio: 0.60
    min_positive_alpha_window_ratio: 0.55
    min_median_expectancy: 0.000
    max_worst_mdd: 0.30
    min_trade_count_min: 8

sleeve_research:
  sectors:
    - "Materials"
    - "Energy"
    - "Industrials"
  top_n_values: [1, 2]
  horizon_days_values: [5, 10, 15]
  support:
    min_trade_count_for_rank: 75
    target_trade_count_for_score: 100
    min_trade_count_for_live_section: 75
    min_trade_count_for_top_sections: 75
    min_distinct_tickers_for_rank: 3
    target_distinct_tickers_for_score: 5
    min_distinct_tickers_for_top_sections: 3
    target_live_match_count_for_score: 2
    min_live_match_count_for_top_sections: 1
  breadth_thresholds:
    sector_pct_above_50_min: [0.40, 0.50, 0.60]
    sector_pct_above_200_min: [0.40, 0.50, 0.60]
    sector_median_roc_63_min: [0.00, 0.05]
  base_filters:
    relative_strength_index_vs_spy_min: 75.0
    roc_63_min: 0.05
    vol_alpha_min: 1.0
    rsi_14_min: 40.0
    rsi_14_max: 65.0
  rank_weights:
    relative_strength_index_vs_spy: 0.40
    roc_63: 0.25
    rsi_14_pullback: 0.20
    vol_alpha: 0.15

