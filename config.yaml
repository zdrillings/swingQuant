features:
  trend:
  - name: sma_50_dist
    type: pct_diff
    params:
      window: 50
  - name: sma_200_dist
    type: pct_diff
    params:
      window: 200
  - name: ma_alignment_50_200
    type: moving_average_gap
    params:
      short_window: 50
      long_window: 200
  - name: ma_slope_50_20
    type: moving_average_slope
    params:
      window: 50
      slope_window: 20
  - name: ma_slope_200_20
    type: moving_average_slope
    params:
      window: 200
      slope_window: 20
  - name: atr_14
    type: atr
    params:
      window: 14
  - name: atr_pct_14
    type: atr_pct
    params:
      window: 14
  momentum:
  - name: rsi_14
    type: rsi
    params:
      window: 14
  - name: rsi_2
    type: rsi
    params:
      window: 2
  - name: roc_63
    type: roc
    params:
      window: 63
  - name: roc_126
    type: roc
    params:
      window: 126
  - name: relative_strength_index_vs_spy
    ticker: SPY
    type: relative_strength_percentile
    params:
      window: 63
  - name: relative_strength_index_vs_qqq
    ticker: QQQ
    type: relative_strength_percentile
    params:
      window: 63
  - name: relative_strength_index_vs_xlk
    ticker: XLK
    type: relative_strength_percentile
    params:
      window: 63
  - name: relative_strength_index_vs_subindustry
    type: relative_strength_percentile_contextual
    params:
      window: 63
      benchmark_column: subindustry_benchmark
  volume:
  - name: vol_alpha
    type: ratio_to_avg
    params:
      window: 20
  - name: breakout_volume_ratio_50
    type: ratio_to_avg
    params:
      window: 50
  - name: base_volume_dryup_ratio_20
    type: volume_dryup_ratio
    params:
      recent_window: 10
      prior_window: 10
  price_structure:
  - name: base_range_pct_20
    type: base_range_pct
    params:
      window: 20
  - name: base_atr_contraction_20
    type: base_atr_contraction
    params:
      atr_window: 14
      recent_window: 10
      prior_window: 10
  - name: breakout_above_20d_high
    type: breakout_above_high
    params:
      window: 20
  - name: distance_above_20d_high
    type: distance_above_high
    params:
      window: 20
  gap_risk:
  - name: avg_abs_gap_pct_20
    type: avg_abs_gap_pct
    params:
      window: 20
  - name: max_gap_down_pct_60
    type: max_gap_down_pct
    params:
      window: 60
  commodities:
  - name: oil_corr_60
    ticker: USO
    type: correlation
    params:
      window: 60
  event_risk:
  - name: days_to_next_earnings
    type: days_to_next_event
  - name: days_since_last_earnings
    type: days_since_last_event
  - name: last_earnings_gap_pct
    type: last_earnings_gap_pct
  - name: last_earnings_volume_ratio_20
    type: last_earnings_volume_ratio
    params:
      window: 20
  - name: last_earnings_open_vs_20d_high
    type: last_earnings_open_vs_high
    params:
      window: 20
  - name: close_vs_last_earnings_close
    type: close_vs_last_earnings_close
signal_model:
  default_pass_score: 30
  hard_filter_indicators:
  - relative_strength_index_vs_spy_min
  - relative_strength_index_vs_qqq_min
  - relative_strength_index_vs_xlk_min
  - relative_strength_index_vs_subindustry_min
  - sma_50_dist_min
  - ma_alignment_50_200_min
  - ma_slope_50_20_min
  - ma_slope_200_20_min
  - breakout_above_20d_high_min
  - distance_above_20d_high_max
  - days_to_next_earnings_min
  - days_since_last_earnings_min
  - days_since_last_earnings_max
  - last_earnings_gap_pct_min
  - last_earnings_volume_ratio_20_min
  - last_earnings_open_vs_20d_high_min
  score_spans:
    rsi_14_min: 20
    rsi_14_max: 30
    vol_alpha_min: 1.2
    breakout_volume_ratio_50_min: 1.5
    sma_50_dist_max: 0.06
    sma_200_dist_min: 0.25
    sma_200_dist_max: 0.2
    roc_63_min: 0.2
    roc_126_min: 0.25
    base_range_pct_20_max: 0.1
    base_atr_contraction_20_max: 0.4
    base_volume_dryup_ratio_20_max: 0.4
    avg_abs_gap_pct_20_max: 0.03
    max_gap_down_pct_60_max: 0.06
    oil_corr_60_min: 0.6
    close_vs_last_earnings_close_min: 0.05
  score_weights:
    rsi_14_min: 0.6
    rsi_14_max: 1.0
    vol_alpha_min: 0.4
    breakout_volume_ratio_50_min: 1.2
    sma_50_dist_max: 1.0
    sma_200_dist_min: 1.0
    sma_200_dist_max: 0.8
    roc_63_min: 1.0
    roc_126_min: 0.8
    base_range_pct_20_max: 1.0
    base_atr_contraction_20_max: 0.8
    base_volume_dryup_ratio_20_max: 0.8
    avg_abs_gap_pct_20_max: 0.7
    max_gap_down_pct_60_max: 0.8
    oil_corr_60_min: 0.6
    close_vs_last_earnings_close_min: 1.0
backtest_costs:
  slippage_bps_per_side: 5
  commission_bps_per_side: 0
scan_policy:
  max_candidates_total: 6
  max_candidates_per_slot: 3
  max_candidates_per_sector: 3
  pre_cap_candidates_per_slot: 5
  max_snapshot_age_days: 4
  min_opportunity_score: 0.55
  ranking_weights:
    signal_score: 0.35
    expected_alpha: 0.3
    freshness: 0.2
    breadth: 0.15
  overlap_penalties:
    same_ticker: 1.0
    same_slot: 0.03
    same_sector: 0.0
    same_regime: 0.0
  learned_ranker:
    weight: 0.0
    min_train_rows: 40
    min_train_dates: 8
    validation_gate:
      enabled: true
      min_q1_q5_spread: 0.0
      min_ic_mean: 0.0
      min_ic_dates: 5
      min_validation_blocks: 1
    slot_weights:
      energy: 0.0
      materials: 0.0
      industrials: 0.0
  recent_selection_memory:
    enabled: false
    recent_scan_dates: 20
    drag_min_picks: 2
    drag_penalty_scale: 1.0
    drag_penalty_cap: 0.1
    missed_winner_min_count: 2
    missed_winner_boost_scale: 0.25
    missed_winner_boost_cap: 0.1
    missed_winner_min_gap: 0.05
    swap_feedback_gap: 0.03
    swap_max_opportunity_gap: 0.1
  slot_selection_overlay:
    enabled: true
    slot_weights:
      energy:
        distance_above_20d_high: -2.0
        roc_63: -1.5
        sma_200_dist: -1.0
        sector_pct_above_50: -1.5
      materials:
        sector_pct_above_50: 2.0
        sector_pct_above_200: 2.0
        distance_above_20d_high: -2.0
        freshness_score: -1.5
        setup_quality_score: -1.0
        signal_score: -1.0
      industrials:
        roc_63: -1.5
        setup_quality_score: -1.0
        signal_score: -1.0
  shortlist_model:
    enabled: true
    horizon_days: 20
    top_n: 10
    min_opportunity_score: 0.30
    min_train_dates: 252
    test_window_dates: 20
    recent_dates: 60
    refresh_if_stale: true
    use_as_candidate_source: true
    eligible_universe_mode: passed_only
    production_model_name: xgboost_model
    production_eligible_universe_mode: passed_or_trend
    production_model_scope: sector_specific
    production_xgboost_config: balanced_depth4
monitor_policy:
  rsi_2_exit:
    threshold: 90
    min_unrealized_pct: 0.05
    min_days_in_trade: 0
